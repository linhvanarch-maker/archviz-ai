services:
  # ── Backend: FastAPI + SQLite ──────────────────────────────────────────────
  - type: web
    name: archviz-ai-backend
    runtime: python
    rootDir: agent
    buildCommand: pip install -e .
    startCommand: uvicorn flowboard.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FLOWBOARD_WS_HOST
        value: 0.0.0.0
      - key: FLOWBOARD_STORAGE
        value: /opt/render/project/storage
      - key: PYTHON_VERSION
        value: "3.11"

  # ── Frontend: React/Vite → static files ───────────────────────────────────
  - type: web
    name: archviz-ai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "20"
    routes:
      # Proxy /api và /media về backend
      - type: rewrite
        source: /api/*
        destination: https://archviz-ai-backend.onrender.com/api/$1
      - type: rewrite
        source: /media/*
        destination: https://archviz-ai-backend.onrender.com/media/$1
      # SPA fallback — mọi route về index.html
      - type: rewrite
        source: /*
        destination: /index.html
